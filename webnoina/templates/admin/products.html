<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>จัดการสินค้า | Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Prompt',sans-serif;
background:radial-gradient(circle at top,#111827,#000);
color:#e5e7eb;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.title{
font-family:'Orbitron',sans-serif;
color:#2563eb;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:linear-gradient(180deg,#0f172a,#020617);
border-radius:15px;
overflow:hidden;
border:1px solid #1f2937;
}

th,td{
padding:14px;
text-align:center;
}

th{
background:#020617;
color:#2563eb;
font-weight:500;
}

tr{
border-bottom:1px solid #1f2937;
}

tr:hover{
background:#0f172a;
}

.btn{
padding:6px 14px;
border-radius:8px;
text-decoration:none;
font-size:.8rem;
transition:.25s;
cursor:pointer;
display:inline-block;
}

/* เพิ่มสินค้า */

.btn-add{
background:#2563eb;
color:white;
}

.btn-add:hover{
box-shadow:0 0 20px rgba(37,99,235,.6);
}

/* ลบ */

.btn-delete{
border:1px solid #ef4444;
color:#ef4444;
background:transparent;
}

.btn-delete:hover{
background:#ef4444;
color:white;
}

/* แก้ไข */

.btn-edit{
border:1px solid #38bdf8;
color:#38bdf8;
}

.btn-edit:hover{
background:#38bdf8;
color:#000;
}

.top-bar{
margin-bottom:20px;
}

/* ================= POPUP ================= */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.popup-box{
background:#020617;
border:1px solid #1f2937;
padding:35px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,.6);
width:300px;
}

.popup-box h2{
color:#ef4444;
margin-bottom:10px;
}

.popup-box p{
opacity:.8;
}

.popup-buttons{
margin-top:20px;
}

.btn-confirm{
background:#ef4444;
color:white;
padding:8px 18px;
border-radius:8px;
text-decoration:none;
margin-left:10px;
}

.btn-confirm:hover{
box-shadow:0 0 15px rgba(239,68,68,.6);
}

.btn-cancel{
background:#1f2937;
color:white;
border:none;
padding:8px 18px;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">📦 จัดการสินค้า</h1>

<div class="top-bar">
<a href="/admin/products/add" class="btn btn-add">➕ เพิ่มสินค้า</a>
<a href="/admin" class="btn btn-delete">← กลับ</a>
</div>

<table>

<tr>
<th>ID</th>
<th>ชื่อสินค้า</th>
<th>ราคา</th>
<th>หมวดหมู่</th>
<th>จัดการ</th>
</tr>

{% for product in products %}

<tr>

<td>{{ product.id }}</td>
<td>{{ product.name }}</td>
<td>฿{{ "{:,}".format(product.price) }}</td>
<td>{{ product.category }}</td>

<td>

<a href="/admin/products/edit/{{ product.id }}" class="btn btn-edit">
✏️ แก้ไข
</a>

<button 
class="btn btn-delete"
onclick="openDeletePopup({{ product.id }})">
❌ ลบ
</button>

</td>

</tr>

{% endfor %}

</table>

</div>


<!-- ================= POPUP ================= -->

<div id="deletePopup" class="popup">

<div class="popup-box">

<h2>⚠️ ยืนยันการลบ</h2>

<p>คุณต้องการลบสินค้านี้หรือไม่?</p>

<div class="popup-buttons">

<button class="btn-cancel" onclick="closePopup()">ยกเลิก</button>

<a id="confirmDelete" class="btn-confirm">ลบสินค้า</a>

</div>

</div>

</div>


<script>

function openDeletePopup(id){

document.getElementById("deletePopup").style.display = "flex";

document.getElementById("confirmDelete").href =
"/admin/products/delete/" + id;

}

function closePopup(){

document.getElementById("deletePopup").style.display = "none";

}

</script>


</body>
</html>
