<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เพิ่มสินค้า | Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Prompt',sans-serif;
background:radial-gradient(circle at top,#111827,#000);
color:#e5e7eb;
}

.container{
max-width:600px;
margin:auto;
padding:60px 20px;
}

.card{
background:linear-gradient(180deg,#0f172a,#020617);
border:1px solid #1f2937;
border-radius:20px;
padding:35px;
box-shadow:0 10px 40px rgba(0,0,0,.6);
}

.title{
font-family:'Orbitron',sans-serif;
color:#2563eb;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #1f2937;
background:#020617;
color:#e5e7eb;
margin-bottom:15px;
font-family:'Prompt',sans-serif;
}

input:focus,textarea:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 10px rgba(37,99,235,.4);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
transition:.25s;
}

button:hover{
box-shadow:0 0 20px rgba(37,99,235,.6);
transform:translateY(-1px);
}

.back{
display:block;
margin-top:15px;
text-align:center;
color:#2563eb;
text-decoration:none;
}

.back:hover{
text-decoration:underline;
}

#preview{
width:100%;
border-radius:10px;
margin-bottom:15px;
display:none;
border:1px solid #1f2937;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2 class="title">➕ เพิ่มสินค้าใหม่</h2>

<form method="POST">

<input type="text" name="name" placeholder="ชื่อสินค้า" required>

<textarea name="description" placeholder="รายละเอียดสินค้า" required></textarea>

<input type="number" name="price" placeholder="ราคา" required>

<input type="text" name="category" placeholder="หมวดหมู่" required>

<input type="text" name="image_url" id="image_url" placeholder="URL รูปสินค้า" required>

<img id="preview">

<button type="submit">บันทึกสินค้า</button>

</form>

<a href="/admin/products" class="back">
← กลับไปหน้าจัดการสินค้า
</a>

</div>

</div>

<script>

const imageInput = document.getElementById("image_url");
const preview = document.getElementById("preview");

imageInput.addEventListener("input", function(){

const url = this.value;

if(url){
preview.src = url;
preview.style.display = "block";
}else{
preview.style.display = "none";
}

});

</script>

</body>
</html>
