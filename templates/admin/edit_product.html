<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>แก้ไขสินค้า | Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Prompt',sans-serif;
background:radial-gradient(circle at top,#111827,#000);
color:#e5e7eb;
}

.container{
max-width:600px;
margin:auto;
padding:50px 20px;
}

.title{
font-family:'Orbitron',sans-serif;
color:#2563eb;
margin-bottom:20px;
}

.form-card{
background:linear-gradient(180deg,#0f172a,#020617);
border:1px solid #1f2937;
border-radius:18px;
padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,.6);
}

.form-group{
margin-bottom:15px;
}

input, textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #1f2937;
background:#020617;
color:#e5e7eb;
font-family:'Prompt',sans-serif;
}

textarea{
resize:none;
}

input:focus, textarea:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 10px rgba(37,99,235,.4);
}

.btn{
padding:10px 20px;
border-radius:10px;
text-decoration:none;
font-size:.9rem;
transition:.25s;
border:none;
cursor:pointer;
display:inline-block;
}

.btn-save{
background:#2563eb;
color:white;
}

.btn-save:hover{
box-shadow:0 0 20px rgba(37,99,235,.6);
transform:translateY(-1px);
}

.btn-back{
border:1px solid #2563eb;
color:#2563eb;
margin-bottom:15px;
}

.btn-back:hover{
background:#2563eb;
color:white;
}

.top-bar{
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">✏️ แก้ไขสินค้า</h1>

<div class="top-bar">
<a href="/admin/products" class="btn btn-back">← กลับ</a>
</div>

<div class="form-card">

<form method="POST">

<div class="form-group">
<input type="text" name="name" value="{{ product.name }}" placeholder="ชื่อสินค้า">
</div>

<div class="form-group">
<input type="number" name="price" value="{{ product.price }}" placeholder="ราคา">
</div>

<div class="form-group">
<input type="text" name="category" value="{{ product.category }}" placeholder="หมวดหมู่">
</div>

<div class="form-group">
<input type="text" name="image_url" value="{{ product.image_url }}" placeholder="URL รูปสินค้า">
</div>

<div class="form-group">
<textarea name="description" rows="4" placeholder="รายละเอียดสินค้า">{{ product.description }}</textarea>
</div>

<button type="submit" class="btn btn-save">
💾 บันทึกการแก้ไข
</button>

</form>

</div>

</div>

</body>
</html>
